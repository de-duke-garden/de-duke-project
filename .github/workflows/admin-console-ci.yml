# Admin Web Console -- PR checks (typecheck, lint, build).
#
# Deploy is NOT done here -- Vercel own GitHub integration (once this
# repo is connected to a Vercel project) automatically builds and deploys
# on every push, using Vercel own project-level Environment Variables
# for the real NEXT_PUBLIC_API_BASE_URL / BACKEND_API_URL /
# NEXT_PUBLIC_FIREBASE_* values. This workflow only guards pull requests.
name: Admin Console CI

on:
  pull_request:
    paths:
      - "apps/admin-console/**"
      - ".github/workflows/admin-console-ci.yml"

defaults:
  run:
    working-directory: apps/admin-console

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin-console/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Build
        # Uses placeholder env values -- this only proves the build compiles,
        # it does not talk to a real backend/Firebase project. Real values
        # live in Vercel's own project Environment Variables (configured in the
        # Vercel dashboard once this repo is connected), never in this repo.
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/v1
          BACKEND_API_URL: http://localhost:8000
          NEXT_PUBLIC_FIREBASE_API_KEY: build-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: build-placeholder
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: build-placeholder
        run: npm run build
