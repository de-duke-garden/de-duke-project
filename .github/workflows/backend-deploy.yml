# Backend API Service -- build, push, and deploy. Implements the backend
# deploy pipeline described in docs/De-Duke/architecture.md's
# "Infrastructure as Code & CI/CD" section; see that doc and
# infra/README.md's "CI/CD: which workflow applies infra changes" for the
# full split-workflow design and rationale (companion: infra-terraform.yml).
#
# Required GitHub repo configuration (Settings -> Secrets and variables),
# per GitHub Environment (development, later staging/production):
#   Secrets:
#     AWS_ROLE_TO_ASSUME    - IAM role ARN this workflow assumes via OIDC
#                             (no long-lived AWS access keys stored in GitHub)
#     TF_GCP_PROJECT_ID     - that environment's gcp_project_id
#     TF_AWS_ACCOUNT_SUFFIX - that environment's aws_account_suffix
#   Variables:
#     AWS_REGION             - region actual AWS resources live in (e.g.
#                               eu-west-1) -- used for the AWS CLI/provider,
#                               NOT necessarily the state bucket's own region
#     TF_STATE_BUCKET        - name of the existing S3 bucket used for Terraform state
#     TF_STATE_BUCKET_REGION - region that bucket itself was created in (can
#                               differ from AWS_REGION -- S3 bucket region is
#                               fixed at creation and unrelated to which
#                               region your resources deploy into)
#     TF_ACM_CERTIFICATE_ARN - (optional, blank until a domain/cert exists)
#   Environments (Settings -> Environments): one per active matrix entry
#     below (create it even with no protection rules yet, so the
#     `environment:` key resolves)
#
# Environment matrix
# -------------------
# All three environments are scaffolded (infra/environments/{staging,
# production}/main.tf). `deploy`, `smoke-test`, and `rollback` are folded
# into a single matrixed job below (steps run in sequence per leg) rather
# than three separate jobs linked by `needs.<job>.outputs.*` -- GitHub
# Actions does not expose per-matrix-leg outputs across jobs (a downstream
# job's `needs.<job>.outputs.x` resolves to whichever leg finished last,
# not "the leg matching this same matrix entry"), which would silently mix
# up environments' alb_dns_name/previous_image_tag the moment more than one
# matrix leg is active. Within a single job, steps share `steps.<id>.outputs`
# correctly scoped per matrix leg, so this restructuring is what makes
# running staging/production here safe.
name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-deploy.yml"

permissions:
  id-token: write # required for AWS OIDC federation (no static access keys)
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
      ecr_repository_url: ${{ steps.ecr.outputs.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        # Git SHA, never `latest` -- infra/modules/ecr sets
        # image_tag_mutability = "IMMUTABLE", so a reused tag would fail to
        # push on the second deploy.
        run: echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR repository URL
        id: ecr
        # Name is fixed in infra/modules/ecr/main.tf -- read it directly
        # instead of requiring a `terraform output` round-trip just to push
        # an image (terraform apply happens later in this same workflow).
        run: |
          REPO_URL=$(aws ecr describe-repositories \
            --repository-names de-duke/backend-api \
            --query "repositories[0].repositoryUri" --output text)
          echo "repository=${REPO_URL}" >> "$GITHUB_OUTPUT"

      # Idempotency check: infra/modules/ecr sets image_tag_mutability =
      # "IMMUTABLE", and the tag is this commit's Git SHA -- so re-running
      # this workflow for the SAME commit (e.g. retrying a failed run
      # after fixing something downstream, like a Terraform apply error)
      # would try to push an identical tag a second time, which ECR
      # correctly refuses. Skip build/push entirely if this SHA is already
      # in ECR; the existing image is byte-identical to what a rebuild
      # would produce anyway.
      - name: Check whether this tag already exists in ECR
        id: existing-image
        run: |
          if aws ecr describe-images \
            --repository-name de-duke/backend-api \
            --image-ids imageTag="${{ steps.tag.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        if: steps.existing-image.outputs.exists == 'false'
        working-directory: apps/backend
        run: |
          docker build \
            -t "${{ steps.ecr.outputs.repository }}:${{ steps.tag.outputs.value }}" \
            .

      - name: Push image
        if: steps.existing-image.outputs.exists == 'false'
        run: docker push "${{ steps.ecr.outputs.repository }}:${{ steps.tag.outputs.value }}"

  deploy:
    needs: build-and-push
    strategy:
      fail-fast: true # a failed leg blocks the next environment in the matrix
      max-parallel: 1 # enforces development -> staging -> production order
      matrix:
        include:
          - environment: development
          # - environment: staging
          # - environment: production
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    # Keyed per environment -- shared with infra-terraform.yml's apply job.
    concurrency:
      group: terraform-${{ matrix.environment }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infra/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.4"

      - name: Capture currently-deployed image tag (for rollback)
        id: previous-tag
        run: |
          CURRENT_TAG=$(aws ecs describe-task-definition \
            --task-definition ${{ matrix.environment }}-de-duke-api \
            --query "taskDefinition.containerDefinitions[0].image" --output text \
            | sed "s/.*://") || CURRENT_TAG=""
          echo "value=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"

      # Deliberately TF_STATE_BUCKET_REGION here, not AWS_REGION (used
      # above for the AWS CLI/provider) -- an S3 bucket's region is fixed
      # at creation and can differ from the region actual resources
      # deploy into. Conflating the two here caused a real "301: bucket
      # in a different region" init failure.
      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.environment }}/terraform.tfstate" \
            -backend-config="region=${{ vars.TF_STATE_BUCKET_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: terraform plan
        # vercel_apex_ips is a list(string) -- only passed when set (see
        # infra-terraform.yml's identical step).
        run: |
          VERCEL_ARGS=()
          if [ -n "${{ vars.TF_VERCEL_APEX_IPS }}" ]; then
            VERCEL_ARGS+=(-var="vercel_apex_ips=${{ vars.TF_VERCEL_APEX_IPS }}")
          fi
          terraform plan \
            -var="gcp_project_id=${{ secrets.TF_GCP_PROJECT_ID }}" \
            -var="aws_account_suffix=${{ secrets.TF_AWS_ACCOUNT_SUFFIX }}" \
            -var="acm_certificate_arn=${{ vars.TF_ACM_CERTIFICATE_ARN }}" \
            -var="vercel_cname_target=${{ vars.TF_VERCEL_CNAME_TARGET }}" \
            "${VERCEL_ARGS[@]}" \
            -var="image_tag=${{ needs.build-and-push.outputs.image_tag }}" \
            -out=tfplan

      # Gated by this environment's protection rule (add a required
      # reviewer in Settings -> Environments if desired).
      - name: terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf-outputs
        run: |
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
          echo "private_subnet_ids=$(terraform output -json private_subnet_ids | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "service_security_group_id=$(terraform output -raw service_security_group_id)" >> "$GITHUB_OUTPUT"

      # Runs `alembic upgrade head` as a one-off Fargate task, using the
      # task definition terraform apply just registered above (so it has
      # this deploy's image and DB_PROXY_ENDPOINT/DB_CREDENTIALS/APP_SECRETS
      # wiring, see apps/backend/app/core/config.py), overriding only the
      # container command. Runs in the same subnets/security group as the
      # real service so it reaches the RDS Proxy identically -- see
      # infra/environments/development/security_groups.tf's self-referencing
      # ingress rule. Placed after `terraform apply`, before smoke-test, so
      # the schema exists before the new app revision starts serving traffic.
      - name: Run database migrations
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.tf-outputs.outputs.cluster_name }}" \
            --task-definition "${{ matrix.environment }}-de-duke-api" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=${{ steps.tf-outputs.outputs.private_subnet_ids }},securityGroups=[\"${{ steps.tf-outputs.outputs.service_security_group_id }}\"],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"backend-api","command":["alembic","upgrade","head"]}]}' \
            --query "tasks[0].taskArn" --output text)

          echo "Migration task: ${TASK_ARN}"
          aws ecs wait tasks-stopped --cluster "${{ steps.tf-outputs.outputs.cluster_name }}" --tasks "${TASK_ARN}"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ steps.tf-outputs.outputs.cluster_name }}" \
            --tasks "${TASK_ARN}" \
            --query "tasks[0].containers[0].exitCode" --output text)

          echo "Migration task exit code: ${EXIT_CODE}"
          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Migration failed -- see the task's CloudWatch log stream (aws_cloudwatch_log_group.backend, see infra/modules/fargate_service/main.tf) for details."
            exit 1
          fi

      # architecture.md step 5: "automated functional smoke tests, plus a
      # lightweight performance smoke test ... a failure ... triggers an
      # automatic rollback." This is the functional half.
      - name: Smoke test -- wait for rolling deploy to finish, then hit /health/ready
        id: smoke-test
        run: |
          URL="http://${{ steps.tf-outputs.outputs.alb_dns_name }}/health/ready"
          for i in $(seq 1 10); do
            if curl -fsS "$URL"; then
              echo "Functional smoke test passed."
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "Functional smoke test failed after 10 attempts."
          exit 1

      # The lightweight performance half of the smoke test: a small, fast
      # subset (~2-3 min) of the full load_tests/ suite, run against this
      # same environment right after the functional check above passes.
      # Catches obvious latency/error-rate regressions on every deploy
      # without the cost/time of the full suite (see load_tests/README.md
      # Cadence, and architecture.md's Load Testing & Performance
      # Validation section). A failure here rolls back exactly like a
      # functional smoke-test failure.
      #
      # Skipped for `development`: smoke.js logs in as the seeded
      # `load+<n>@synthetic.de-duke.internal` accounts (lib/client.js's
      # loginSyntheticUser), which only ever exist in `staging` --
      # apps/backend/scripts/seed_load_test_data.py hard-refuses to run
      # against anything else (_require_staging_environment, checked via
      # DB_PROXY_ENDPOINT's "staging-" prefix; see load_tests/README.md
      # "Runs exclusively against the staging environment"). Running this
      # step against `development` doesn't catch a real regression -- it
      # deterministically fails every login with 401 (no such users exist
      # there) and rolls back an otherwise-good deploy. Re-include
      # `development` here only if a dev-specific seed path is ever added.
      - name: Performance smoke test (lightweight k6 subset)
        id: perf-smoke-test
        if: matrix.environment != 'development'
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load_tests/scenarios/smoke.js
        env:
          BASE_URL: http://${{ steps.tf-outputs.outputs.alb_dns_name }}
          K6_ENVIRONMENT: ${{ matrix.environment }}

      - name: Rollback to previous image tag on failure
        if: failure() && steps.previous-tag.outputs.value != ''
        # Re-applies the previously-deployed image tag captured above,
        # undoing this leg's deploy. Runs as a step (not a separate job) so
        # it has direct access to this same matrix leg's `previous-tag`
        # output -- see the header comment on why this can't be a
        # cross-job `needs.*.outputs` reference once more than one
        # environment is active in the matrix.
        run: |
          VERCEL_ARGS=()
          if [ -n "${{ vars.TF_VERCEL_APEX_IPS }}" ]; then
            VERCEL_ARGS+=(-var="vercel_apex_ips=${{ vars.TF_VERCEL_APEX_IPS }}")
          fi
          terraform apply -auto-approve \
            -var="gcp_project_id=${{ secrets.TF_GCP_PROJECT_ID }}" \
            -var="aws_account_suffix=${{ secrets.TF_AWS_ACCOUNT_SUFFIX }}" \
            -var="acm_certificate_arn=${{ vars.TF_ACM_CERTIFICATE_ARN }}" \
            -var="vercel_cname_target=${{ vars.TF_VERCEL_CNAME_TARGET }}" \
            "${VERCEL_ARGS[@]}" \
            -var="image_tag=${{ steps.previous-tag.outputs.value }}"
