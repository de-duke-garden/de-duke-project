# Marketing Website -- deploy to Vercel on merge to main.
#
# Static export (SSG) per architecture.md, so this build has no
# environment variables to pull from Vercel at all -- simpler than the
# admin console's deploy.
#
# Required GitHub repo secrets (Settings -> Secrets and variables):
#   VERCEL_TOKEN                - same token as admin-console-deploy.yml
#                                  (one Vercel account/team, two projects)
#   VERCEL_ORG_ID                - same value as admin-console-deploy.yml
#   VERCEL_PROJECT_ID_MARKETING  - from apps/marketing-site/.vercel/project.json,
#                                  created by running vercel link locally once
#                                  (a separate Vercel project from admin-console)
name: Marketing Site Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/marketing-site/**"
      - ".github/workflows/marketing-site-deploy.yml"

defaults:
  run:
    working-directory: apps/marketing-site

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_MARKETING }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy (prebuilt)
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
