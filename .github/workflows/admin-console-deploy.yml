# Admin Web Console -- deploy to Vercel on merge to main.
#
# Uses the Vercel CLI directly (not a third-party GitHub Action) so the
# exact deploy commands are auditable here rather than hidden inside an
# action. Vercel own project-level Environment Variables (configured in
# the Vercel dashboard, not this repo) supply the real
# NEXT_PUBLIC_API_BASE_URL / BACKEND_API_URL / NEXT_PUBLIC_FIREBASE_* values
# at build time -- this workflow never sees or needs them.
#
# Required GitHub repo secrets (Settings -> Secrets and variables):
#   VERCEL_TOKEN            - personal/team token from vercel.com/account/tokens
#   VERCEL_ORG_ID            - from apps/admin-console/.vercel/project.json,
#                              created by running vercel link locally once
#   VERCEL_PROJECT_ID_ADMIN  - same file, the projectId field
name: Admin Console Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/admin-console/**"
      - ".github/workflows/admin-console-deploy.yml"

defaults:
  run:
    working-directory: apps/admin-console

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy (prebuilt)
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
