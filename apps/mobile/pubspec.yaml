name: de_duke_mobile
description: De-Duke -- Nigerian real estate marketplace mobile app (seekers, hosts, agencies, corporate).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  cloud_firestore: ^5.5.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  firebase_auth: ^5.3.3
  google_maps_flutter: ^2.10.0
  google_sign_in: ^6.2.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
