name: de_duke_mobile
description: De-Duke -- Nigerian real estate marketplace mobile app (seekers, hosts, agencies, corporate).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  cloud_firestore: ^5.5.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  firebase_auth: ^5.3.3
  google_maps_flutter: ^2.10.0
  google_sign_in: ^6.2.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  image_picker: ^1.2.3
  geolocator: ^14.0.2
  # Pinned below its latest (13.x) -- 13.x's win32 ^6.0.1 requirement
  # conflicts with flutter_secure_storage 9.x's win32 ^5.0.0 transitive
  # dependency (via flutter_secure_storage_windows); 12.0.2 is the newest
  # version compatible with this project's existing flutter_secure_storage
  # pin. Revisit once flutter_secure_storage is upgraded past 10.0.0-beta.1.
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  # FEAT-001 (Google & Firebase Sign-Up / Login) -- test-only fake
  # FirebaseAuth/User/UserCredential implementations, so
  # auth_repository_test.dart can exercise AuthRepository's Firebase-based
  # sign-in methods without a real Firebase project or platform channels.
  # Pinned to the 0.14.x line (latest: 0.14.2) rather than 0.15.x+ --
  # 0.15.0 bumped its firebase_auth constraint to ^6.0.0, incompatible
  # with this project's firebase_auth ^5.3.3 pin (shared by
  # chat_repository.dart/support_repository.dart/main.dart; bumping that
  # is a separate, wider-reaching upgrade, out of scope here).
  firebase_auth_mocks: ^0.14.2
  # Used directly in auth_repository_test.dart (whenCalling(...).thenThrow(...))
  # to simulate FirebaseAuthException from a MockFirebaseAuth call -- also a
  # transitive dependency of firebase_auth_mocks, but declared explicitly
  # since it's imported directly, not just used through that package.
  mock_exceptions: ^0.8.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# flutter_launcher_icons config -- generates Android mipmap-*/ic_launcher.png
# and iOS AppIcon.appiconset from the shipped brand mark
# (assets/images/de-duke.png). branding.md's Logo & Iconography row: "mark
# alone as the app icon". The source PNG has a transparent background, so
# it's composited on `surface` (#FFFFFF, app_colors.dart's AppColors.surface)
# -- the plain white background branding.md explicitly allows for the app
# icon slot, keeping the green mark maximally legible against any OS icon
# tray/wallpaper rather than blending into a tinted background.
# `ios: false` -- no ios/ platform directory exists in this project yet
# (Android + Web only, per `ls apps/mobile`). Flip to `true` and rerun
# `dart run flutter_launcher_icons` once `flutter create --platforms=ios .`
# scaffolds the iOS runner; until then this key would only crash the
# generator looking for a non-existent Assets.xcassets path.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/de-duke-launch.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/de-duke-launch.png"
  min_sdk_android: 21

# flutter_native_splash config -- native splash screen per branding.md's
# Logo Usage row ("Full lockup ... on splash screen"). The wordmark half of
# the lockup can't be natively composited by this package (it only places a
# single image), so the native splash shows the mark alone on `surface`;
# the in-app Sign-Up/Login screen (screens.md Screen 1) immediately after
# is where the full mark + Manrope wordmark lockup actually renders -- see
# AGENTS.md follow-up note for a possible pre-rendered composite image if a
# closer native-splash match to the full lockup is wanted later.
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/de-duke-launch.png
  color_dark: "#101613"
  image_dark: assets/images/de-duke-launch.png
  android_12:
    color: "#FFFFFF"
    image: assets/images/de-duke-launch.png
    color_dark: "#101613"
    image_dark: assets/images/de-duke-launch.png
